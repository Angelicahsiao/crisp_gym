services:
  crispy-gym:
    build:
      context: .
      dockerfile: Dockerfile
    image: crisp-gym-pixi:test
    container_name: crisp-gym
    volumes:
      - ~/workspaces:/workspaces
      - $HOME/.Xauthority:/root/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
    environment:
      - QT_X11_NO_MITSHM=1
      - DISPLAY=$DISPLAY
      - ROS_DOMAIN_ID=100
      - RCUTILS_COLORIZED_OUTPUT=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp  # <--- add this!
      # - CRISP_CONFIG_PATH=/workspace/configs
    network_mode: "host"
    stdin_open: true
    tty: true
    ipc: "host"
    pid: "host"
    privileged: true
    working_dir: /workspaces/crisp_gym
    command: bash -c "if [ ! -d /workspaces/crisp_gym/.pixi/envs/humble ]; then pixi install -e humble; fi && exec bash"