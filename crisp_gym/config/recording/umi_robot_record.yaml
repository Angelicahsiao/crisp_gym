# Robot-arm recording with the UMI data contract — SAME schema as
# umi_handheld_record.yaml so both datasets can train one policy.
# Drive: any teleop (leader arm deltas, FACTR joints, ...) via drive_fn;
# the recorded action is the follower's MEASURED TCP pose[t+1], never the command.
# Works with cartesian- or joint-driven follower envs alike.
name: "umi_robot"
rate_hz: 15.0

observations:
  - key: observation.state.cartesian
    source: robot.tcp_pose
    representation: rotation_6d
  - key: observation.state.gripper
    source: gripper.width_normalized
    reference_width: 0.09          # SAME reference as handheld
    device_max_width: 0.140        # SET to your gripper (0.140 Robotiq 2F-140, 0.08 Franka Hand)
  - key: observation.images.primary
    source: camera.image
    camera: primary
    shape: [224, 224, 3]

action:
  definition: next_tcp_pose
  lookahead: 1
  representation: rotation_6d
  include_gripper: true
  gripper_params:
    reference_width: 0.09
    device_max_width: 0.140
