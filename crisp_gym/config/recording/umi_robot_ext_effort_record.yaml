# UMI robot recording + gravity-free EXTERNAL joint effort (contact signal).
#
# Same policy-facing UMI contract as umi_robot_record.yaml (so datasets stay
# mixable), plus the estimated external joint effort as an EXTRA (analysis)
# column. The estimate is tau_ext = tau_measured - g(q), computed by
# crisp_gym.util.external_effort.ExternalEffortEstimator (Pinocchio) from the
# robot's live /robot_description. This is the JOINT-space external effort
# (6 values for the UR) — complementary to the Cartesian TCP wrench from the
# /force_torque_sensor_broadcaster force_torque sensor.
#
# Requirements:
#   * pinocchio available in the recording environment (pixi adds it).
#   * has_effort_feedback: true in the robot config, and /joint_states carrying
#     current-derived effort (UR does).
#   * For accurate readings, provide a calibration file (see below); without it
#     scale=1, offset=0 (raw current-to-torque errors and static friction are
#     NOT compensated).
#
# To make it a POLICY INPUT instead of an analysis extra, change the key to
# `observation.state.external_effort` and set include_in_state: true — but then
# datasets without this column (e.g. handheld) are no longer mixable, exactly
# like the joint extras.
name: "umi_robot_ext_effort"
rate_hz: 15.0

observations:
  # ── policy-facing (the UMI contract) ────────────────────────────────────────
  - key: observation.state.cartesian
    source: robot.tcp_pose
    representation: rotation_6d
  - key: observation.state.gripper
    source: gripper.width_normalized
    reference_width: 0.09
    device_max_width: 0.140        # SET to your gripper (0.140 Robotiq 2F-140)
  - key: observation.images.primary
    source: camera.image
    camera: primary
    shape: [224, 224, 3]

  # ── external joint effort (saved, NOT a policy input) ──────────────────────
  - key: extra.external_effort
    source: robot.external_effort
    shape: [6]                     # 6 = UR, 7 = Franka
    include_in_state: false
    # calibration: "calibration/ur7e_ext_effort.json"   # optional scale/offset

action:
  definition: next_tcp_pose
  lookahead: 1
  representation: rotation_6d
  include_gripper: true
  gripper_params:
    reference_width: 0.09
    device_max_width: 0.140
