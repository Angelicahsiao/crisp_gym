# Robot-arm recording, UMI data contract + ALL available robot states.
#
# The policy-facing schema (include_in_state: true entries + action) is
# IDENTICAL to umi_robot_record.yaml / umi_handheld_record.yaml, so the
# contract check treats these datasets as mixable. The extra states
# (include_in_state: false) are saved for analysis/debugging only and are
# stripped by scripts/postprocess_align_datasets.py before mixing with
# datasets that lack them (e.g. handheld data has no joints).
#
# Adjust `shape` of the joint entries to your robot's DOF (6 = UR, 7 = Franka)
# and device_max_width to your gripper (0.140 Robotiq 2F-140, 0.08 Franka Hand).
name: "umi_robot_full"
rate_hz: 15.0

observations:
  # ── policy-facing (the UMI contract) ────────────────────────────────────────
  - key: observation.state.cartesian
    source: robot.tcp_pose
    representation: rotation_6d
  - key: observation.state.gripper
    source: gripper.width_normalized
    reference_width: 0.09
    device_max_width: 0.140
  - key: observation.images.primary
    source: camera.image
    camera: primary
    shape: [224, 224, 3]

  # ── extra states (saved, NOT policy inputs) ────────────────────────────────
  # IMPORTANT: extras use the "extra." prefix, NOT "observation.": LeRobot's
  # dataset_to_policy_features() treats EVERY observation.* key as a policy
  # STATE input regardless of our include_in_state flag, which breaks
  # mixability with handheld data. Keys outside observation./action are
  # stored in the dataset but silently ignored by the policy — exactly what
  # we want for debug/analysis states.
  - key: extra.joints
    source: robot.joint_positions
    shape: [6]
    include_in_state: false
  - key: extra.joint_velocities
    source: robot.joint_velocities
    shape: [6]
    include_in_state: false
  - key: extra.joint_efforts                    # needs has_effort_feedback: true
    source: robot.joint_efforts
    shape: [6]
    include_in_state: false
  - key: extra.target_cartesian                 # commanded pose (tracking error analysis)
    source: robot.target_pose
    representation: rotation_6d
    include_in_state: false
  - key: extra.gripper_raw                      # uncalibrated device value
    source: gripper.raw_value
    include_in_state: false

action:
  definition: next_tcp_pose
  lookahead: 1
  representation: rotation_6d
  include_gripper: true
  gripper_params:
    reference_width: 0.09
    device_max_width: 0.140
