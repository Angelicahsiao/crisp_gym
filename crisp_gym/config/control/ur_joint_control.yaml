limit_error: true
limit_torques: true

max_delta_tau: 0.5

nullspace.projector_type: none  # So we are directly controlling the joints!

nullspace.stiffness: 10.0
nullspace.damping: 1.5
nullspace.max_tau: 20.0
nullspace.regularization: 1.0e-06
nullspace.weights.shoulder_pan_joint.value: 15.0
nullspace.weights.shoulder_lift_joint.value: 15.0
nullspace.weights.elbow_joint.value: 8.0
nullspace.weights.wrist_1_joint.value: 8.0
nullspace.weights.wrist_2_joint.value: 5.0
nullspace.weights.wrist_3_joint.value: 5.0

stop_commands: false

# We set the task gains to 0
task.k_pos_x: 0.0
task.k_pos_y: 0.0
task.k_pos_z: 0.0
task.k_rot_x: 0.0
task.k_rot_y: 0.0
task.k_rot_z: 0.0
task.d_pos_x: -1.0
task.d_pos_y: -1.0
task.d_pos_z: -1.0
task.d_rot_x: -1.0
task.d_rot_y: -1.0
task.d_rot_z: -1.0

task.error_clip.rx: 0.5
task.error_clip.ry: 0.5
task.error_clip.rz: 0.5
task.error_clip.x: 0.1
task.error_clip.y: 0.1
task.error_clip.z: 0.1

use_coriolis_compensation: false
use_friction: false
use_local_jacobian: true
use_gravity_compensation: false
use_operational_space: false
